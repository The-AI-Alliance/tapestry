<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">Sovereign alignment pipeline</title>
  <desc id="desc">Three sovereign stages A B C in sequence, with shared consortium tooling supporting each.</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#37474f"/>
    </marker>
  </defs>
  <rect width="720" height="260" fill="#fafafa"/>
  <!-- Stages -->
  <rect x="40" y="44" width="192" height="76" rx="8" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="136" y="78" text-anchor="middle" fill="#fff" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600">Stage A - CPT</text>
  <text x="136" y="98" text-anchor="middle" fill="#e8f5e9" font-family="system-ui,Segoe UI,sans-serif" font-size="11">Culturally grounded data</text>
  <text x="136" y="114" text-anchor="middle" fill="#c8e6c9" font-family="system-ui,Segoe UI,sans-serif" font-size="11">Changes what the model knows</text>
  <rect x="264" y="44" width="192" height="76" rx="8" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="360" y="78" text-anchor="middle" fill="#fff" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600">Stage B - Alignment</text>
  <text x="360" y="98" text-anchor="middle" fill="#e8f5e9" font-family="system-ui,Segoe UI,sans-serif" font-size="11">DPO / RLHF / CAI</text>
  <text x="360" y="114" text-anchor="middle" fill="#c8e6c9" font-family="system-ui,Segoe UI,sans-serif" font-size="11">Changes how it behaves</text>
  <rect x="488" y="44" width="192" height="76" rx="8" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="584" y="78" text-anchor="middle" fill="#fff" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600">Stage C - Instruction</text>
  <text x="584" y="98" text-anchor="middle" fill="#e8f5e9" font-family="system-ui,Segoe UI,sans-serif" font-size="11">Chat readiness - deployment</text>
  <text x="584" y="114" text-anchor="middle" fill="#c8e6c9" font-family="system-ui,Segoe UI,sans-serif" font-size="11">Product shape - tone</text>
  <line x1="232" y1="82" x2="258" y2="82" stroke="#37474f" stroke-width="2" marker-end="url(#a)"/>
  <line x1="456" y1="82" x2="482" y2="82" stroke="#37474f" stroke-width="2" marker-end="url(#a)"/>
  <!-- Tooling -->
  <rect x="120" y="168" width="480" height="52" rx="8" fill="#455a64" stroke="#37474f" stroke-width="2"/>
  <text x="360" y="198" text-anchor="middle" fill="#eceff1" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600">Shared consortium tooling</text>
  <text x="360" y="214" text-anchor="middle" fill="#b0bec5" font-family="system-ui,Segoe UI,sans-serif" font-size="11">Pipelines - alignment stacks - instruction &amp; eval harnesses</text>
  <!-- Dotted connectors -->
  <line x1="136" y1="120" x2="136" y2="168" stroke="#78909c" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="360" y1="120" x2="360" y2="168" stroke="#78909c" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="584" y1="120" x2="584" y2="168" stroke="#78909c" stroke-width="2" stroke-dasharray="6 4"/>
</svg>
