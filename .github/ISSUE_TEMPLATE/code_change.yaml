name: Code Change to Make
description: A change to the project source code
title: "[Code] "  
labels: "code"
assignees: [deanwampler,ctn,adampingel,jolson-ibm]
projects: [The-AI-Alliance/50]
body:
- type: checkboxes
  attributes:
    label: Is there an existing issue for this?
    description: Please search to see if an issue already exists that is similar to your issue/suggestion.
    options:
    - label: I have searched the existing issues
      required: true
- type: textarea
  attributes:
    label: Details
    description: |
      Please describe:
      * The general idea you are proposing. (Use as much detail as you think is necessary.)
      * The "role" of some user who will benefit from having this change implemented.
      * The possible sequence of steps the user might do.
      * Possible user errors or system failures that the implementation should handle.
      * Why would this change be a valuable thing to implement?
      * Are there any alternative solutions you have considered?
  validations:
    required: true
- type: textarea
  attributes:
    label: Additional Context
    description: |
      Add any other context or screenshots about the proposal here.
